name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  # ---------------------------------------
  # --- CODE QUALITY & TESTING JOBS
  # ---------------------------------------

  checks:
    name: Check / Repository Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: just install-deps

      - name: Run shared and pipeline checks
        run: |
          just pylint libs apps/pipelines
          just pytest apps/pipelines/tests

  model-eval:
    name: Check / Model Pipeline Eval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: just install-deps

      - name: Run training checks
        run: |
          just pylint apps/training
          just pytest apps/training/tests

  backend-eval:
    name: Check / Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: just install-deps

      - name: Run backend tests
        run: just pytest apps/web-backend/tests

  frontend-eval:
    name: Check / Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm --workspace apps/web-frontend run lint

      - name: Run frontend build
        run: npm --workspace apps/web-frontend run build

  analyze:
    name: Check / CodeQL (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    # if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  docker-build-apps:
    name: Check / Docker build (API, inference, web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build TicketForge API image (Cloud Run)
        run: |
          docker build \
            -f docker/base.Dockerfile \
            --target cloudrun-web-backend \
            --build-arg APP_NAME=web-backend \
            -t ticketforge-api:ci \
            .

      - name: Build TicketForge inference image
        run: |
          docker build \
            -f docker/inference.Dockerfile \
            -t ticketforge-inference:ci \
            .

      - name: Build TicketForge web image
        run: |
          docker build \
            -f docker/frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=http://127.0.0.1:8000 \
            -t ticketforge-web:ci \
            .

  terraform-validate-plan:
    name: Check / TF Validate/Plan
    runs-on: ubuntu-latest
    outputs:
      run_deploy: ${{ steps.filter.outputs.terraform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Terraform Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            terraform:
              - 'terraform/**'

      - name: Setup Terraform
        if: steps.filter.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Validate
        if: steps.filter.outputs.terraform == 'true'
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform fmt -check -recursive
          terraform validate

      - name: Authenticate to Google (Plan SA)
        if: steps.filter.outputs.terraform == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_ID }}
          service_account: 'tf-plan-sa@${{ secrets.TF_VAR_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        if: steps.filter.outputs.terraform == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.TF_VAR_PROJECT_ID }}

      - name: Terraform Init
        if: steps.filter.outputs.terraform == 'true'
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ secrets.TF_VAR_STATE_BUCKET }}"

      - name: Resolve current serving values
        if: steps.filter.outputs.terraform == 'true'
        id: serving-current
        env:
          PROJECT_ID: ${{ secrets.TF_VAR_PROJECT_ID }}
          REGION: ${{ secrets.TF_VAR_REGION }}
        run: |
          set -euo pipefail

          backend_state="$(terraform -chdir=terraform state show -no-color 'google_cloud_run_v2_service.web_backend' 2>/dev/null || true)"
          frontend_state="$(terraform -chdir=terraform state show -no-color 'google_cloud_run_v2_service.web_frontend' 2>/dev/null || true)"
          ticketforge_api_state="$(terraform -chdir=terraform state show -no-color 'google_cloud_run_v2_service.ticketforge_api[0]' 2>/dev/null || true)"
          ticketforge_inference_state="$(terraform -chdir=terraform state show -no-color 'google_cloud_run_v2_service.ticketforge_inference[0]' 2>/dev/null || true)"
          ticketforge_web_state="$(terraform -chdir=terraform state show -no-color 'google_cloud_run_v2_service.ticketforge_web[0]' 2>/dev/null || true)"

          BACKEND_STATE="${backend_state}" \
          FRONTEND_STATE="${frontend_state}" \
          TICKETFORGE_API_STATE="${ticketforge_api_state}" \
          TICKETFORGE_INFERENCE_STATE="${ticketforge_inference_state}" \
          TICKETFORGE_WEB_STATE="${ticketforge_web_state}" \
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          output_path = Path(os.environ["GITHUB_OUTPUT"])

          def image_from_state(raw: str) -> str:
              match = re.search(r'^\s*image\s*=\s*"([^"]+)"\s*$', raw, flags=re.MULTILINE)
              return match.group(1) if match else ""

          def env_from_state(raw: str, name: str) -> str:
              lines = raw.splitlines()
              for idx, line in enumerate(lines):
                  if re.match(r'^\s*name\s*=\s*"' + re.escape(name) + r'"\s*$', line):
                      for probe in lines[idx + 1: idx + 8]:
                          value_match = re.match(r'^\s*value\s*=\s*"([^"]*)"\s*$', probe)
                          if value_match:
                              return value_match.group(1)
              return ""

          backend_image = image_from_state(os.environ.get("BACKEND_STATE", ""))
          frontend_image = image_from_state(os.environ.get("FRONTEND_STATE", ""))
          frontend_api_url = env_from_state(os.environ.get("FRONTEND_STATE", ""), "NEXT_PUBLIC_API_URL")

          ticketforge_api_image = image_from_state(os.environ.get("TICKETFORGE_API_STATE", ""))
          ticketforge_inference_image = image_from_state(os.environ.get("TICKETFORGE_INFERENCE_STATE", ""))
          ticketforge_web_image = image_from_state(os.environ.get("TICKETFORGE_WEB_STATE", ""))

          app_enabled = all(
              [
                  bool(ticketforge_api_image),
                  bool(ticketforge_inference_image),
                  bool(ticketforge_web_image),
              ]
          )

          lines = [
              f"backend_image={backend_image}",
              "backend_cors_origins=",
              "backend_serving_model_version=",
              f"frontend_image={frontend_image}",
              f"frontend_api_url={frontend_api_url}",
              f"ticketforge_app_enabled={'true' if app_enabled else 'false'}",
              f"ticketforge_api_image={ticketforge_api_image}",
              f"ticketforge_inference_image={ticketforge_inference_image}",
              f"ticketforge_web_image={ticketforge_web_image}",
          ]
          with output_path.open("a", encoding="utf-8") as fh:
              for line in lines:
                  fh.write(f"{line}\n")
          PY

      - name: Terraform Plan
        id: plan
        if: steps.filter.outputs.terraform == 'true'
        working-directory: terraform
        env:
          TF_VAR_region: ${{ secrets.TF_VAR_REGION }}
          TF_VAR_state_bucket: ${{ secrets.TF_VAR_STATE_BUCKET }}
          TF_VAR_project_id: ${{ secrets.TF_VAR_PROJECT_ID }}
          BACKEND_IMAGE: ${{ steps.serving-current.outputs.backend_image }}
          BACKEND_CORS_ORIGINS: ${{ steps.serving-current.outputs.backend_cors_origins }}
          BACKEND_SERVING_MODEL_VERSION: ${{ steps.serving-current.outputs.backend_serving_model_version }}
          FRONTEND_IMAGE: ${{ steps.serving-current.outputs.frontend_image }}
          FRONTEND_API_URL: ${{ steps.serving-current.outputs.frontend_api_url }}
          TICKETFORGE_APP_ENABLED: ${{ steps.serving-current.outputs.ticketforge_app_enabled }}
          TICKETFORGE_API_IMAGE: ${{ steps.serving-current.outputs.ticketforge_api_image }}
          TICKETFORGE_INFERENCE_IMAGE: ${{ steps.serving-current.outputs.ticketforge_inference_image }}
          TICKETFORGE_WEB_IMAGE: ${{ steps.serving-current.outputs.ticketforge_web_image }}
        run: |
          set -o pipefail
          args=(
            -lock=false
            -no-color
            -out=tfplan
          )

          if [[ -n "${BACKEND_IMAGE}" ]]; then
            args+=("-var=web_backend_image=${BACKEND_IMAGE}")
          fi
          if [[ -n "${BACKEND_CORS_ORIGINS}" ]]; then
            args+=("-var=web_backend_cors_origins=${BACKEND_CORS_ORIGINS}")
          fi
          if [[ -n "${BACKEND_SERVING_MODEL_VERSION}" ]]; then
            args+=("-var=web_backend_serving_model_version=${BACKEND_SERVING_MODEL_VERSION}")
          fi
          if [[ -n "${FRONTEND_IMAGE}" ]]; then
            args+=("-var=web_frontend_image=${FRONTEND_IMAGE}")
          fi
          if [[ -n "${FRONTEND_API_URL}" ]]; then
            args+=("-var=web_frontend_api_url=${FRONTEND_API_URL}")
          fi
          if [[ "${TICKETFORGE_APP_ENABLED}" == "true" ]]; then
            args+=("-var=enable_ticketforge_app_cloud_run=true")
            args+=("-var=ticketforge_api_container_image=${TICKETFORGE_API_IMAGE}")
            args+=("-var=ticketforge_inference_container_image=${TICKETFORGE_INFERENCE_IMAGE}")
            args+=("-var=ticketforge_web_container_image=${TICKETFORGE_WEB_IMAGE}")
          fi

          terraform plan "${args[@]}" | tee plan.txt

      - name: Terraform Plan Safety Gate
        if: steps.filter.outputs.terraform == 'true'
        working-directory: terraform
        env:
          TICKETFORGE_APP_ENABLED: ${{ steps.serving-current.outputs.ticketforge_app_enabled }}
        run: |
          terraform show -json tfplan > plan.json

          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          plan = json.loads(Path("plan.json").read_text(encoding="utf-8"))
          problems = []
          ticketforge_app_enabled = os.environ.get("TICKETFORGE_APP_ENABLED", "false").lower() == "true"
          resource_changes = plan.get("resource_changes", [])
          has_ticketforge_app_changes = any(
              rc.get("address", "").startswith("google_cloud_run_v2_service.ticketforge_")
              and rc.get("change", {}).get("actions", []) != ["no-op"]
              for rc in resource_changes
          )
          effective_app_mode = ticketforge_app_enabled or has_ticketforge_app_changes

          for resource_change in resource_changes:
              address = resource_change.get("address", "")
              change = resource_change.get("change", {})
              actions = change.get("actions", [])
              after = change.get("after") or {}

              if "delete" in actions:
                  problems.append(f"{address}: destructive actions {actions}")

              if address == "google_cloud_run_v2_service.web_backend":
                  if effective_app_mode:
                      continue
                  containers = (
                      after.get("template", [{}])[0]
                      .get("containers", [{}])
                  )
                  image = containers[0].get("image", "")
                  if image == "us-docker.pkg.dev/cloudrun/container/hello":
                      problems.append(
                          f"{address}: backend image would reset to placeholder hello image"
                      )

              if address == "google_cloud_run_v2_service.web_frontend":
                  if effective_app_mode:
                      continue
                  containers = (
                      after.get("template", [{}])[0]
                      .get("containers", [{}])
                  )
                  image = containers[0].get("image", "")
                  envs = {
                      item.get("name"): item.get("value", "")
                      for item in containers[0].get("env", [])
                      if isinstance(item, dict)
                  }
                  if image == "us-docker.pkg.dev/cloudrun/container/hello":
                      problems.append(
                          f"{address}: frontend image would reset to placeholder hello image"
                      )
                  if not envs.get("NEXT_PUBLIC_API_URL"):
                      problems.append(
                          f"{address}: NEXT_PUBLIC_API_URL would be empty"
                      )

              if address == "google_cloud_run_v2_service.ticketforge_api[0]":
                  containers = (
                      after.get("template", [{}])[0]
                      .get("containers", [{}])
                  )
                  image = containers[0].get("image", "")
                  if not image:
                      problems.append(
                          f"{address}: ticketforge api image would be empty"
                      )

              if address == "google_cloud_run_v2_service.ticketforge_inference[0]":
                  containers = (
                      after.get("template", [{}])[0]
                      .get("containers", [{}])
                  )
                  image = containers[0].get("image", "")
                  if not image:
                      problems.append(
                          f"{address}: ticketforge inference image would be empty"
                      )

              if address == "google_cloud_run_v2_service.ticketforge_web[0]":
                  containers = (
                      after.get("template", [{}])[0]
                      .get("containers", [{}])
                  )
                  image = containers[0].get("image", "")
                  if not image:
                      problems.append(
                          f"{address}: ticketforge web image would be empty"
                      )

          if problems:
              print("Unsafe Terraform plan detected:", file=sys.stderr)
              for problem in problems:
                  print(f"- {problem}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Generate Summary
        if: steps.filter.outputs.terraform == 'true'
        working-directory: terraform
        run: |
          echo "### Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Click to expand plan</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          cat plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  all-checks-good:
    name: Check / Finished
    needs:
      [checks, model-eval, backend-eval, frontend-eval, analyze, docker-build-apps, terraform-validate-plan]
    # This ensures it runs even if 'analyze' was skipped,
    # but still fails if any of them actually failed.
    if: |
      always() &&
      needs.checks.result == 'success' &&
      needs.model-eval.result == 'success' &&
      needs.backend-eval.result == 'success' &&
      needs.frontend-eval.result == 'success' &&
      (needs.analyze.result == 'success' || needs.analyze.result == 'skipped') &&
      needs.docker-build-apps.result == 'success' &&
      needs.terraform-validate-plan.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required tests passed or were appropriately skipped."
  # ---------------------------------------
  # --- DEPLOYMENT JOBS
  # ---------------------------------------

  deploy-check:
    name: Deploy / Gatekeeper
    needs: [all-checks-good]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Conditions for deploy met."

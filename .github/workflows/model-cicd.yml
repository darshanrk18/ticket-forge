name: Model CI/CD

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
  schedule:
    # Run every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      promote:
        description: "Promote best model to Production in MLflow after training"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      dataset_source:
        description: "Dataset source for retraining"
        required: false
        default: "dvc"
        type: choice
        options: ["dvc", "gcs"]
      trigger_reason:
        description: "Reason this retraining run was started"
        required: false
        default: "manual-dispatch"
        type: string

permissions:
  actions: write
  contents: read
  id-token: write

jobs:
  train-and-promote:
    name: Train / Run & Promote Best Model
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.run-meta.outputs.run_id }}
      gate_report: ${{ steps.run-meta.outputs.gate_report }}
      executed: 'true'
      dataset_source: ${{ steps.workflow-inputs.outputs.dataset_source }}
      trigger_reason: ${{ steps.workflow-inputs.outputs.trigger_reason }}
      promoted_model_version: ${{ steps.promotion-meta.outputs.promoted_model_version }}
      gate_decision: ${{ steps.promotion-meta.outputs.gate_decision }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set run metadata
        id: run-meta
        run: |
          RUN_ID="${{ github.run_id }}-${{ github.run_attempt }}"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "gate_report=models/$RUN_ID/gate_report.json" >> "$GITHUB_OUTPUT"

      - name: Resolve workflow inputs
        id: workflow-inputs
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            dataset_source="${{ github.event.inputs.dataset_source }}"
            trigger_reason="${{ github.event.inputs.trigger_reason }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            dataset_source="gcs"
            trigger_reason="scheduled-health-check"
          else
            dataset_source="dvc"
            trigger_reason="ci-success"
          fi

          if [[ -z "${dataset_source}" ]]; then
            dataset_source="dvc"
          fi

          if [[ -z "${trigger_reason}" ]]; then
            trigger_reason="${{ github.event_name }}"
          fi

          echo "dataset_source=${dataset_source}" >> "$GITHUB_OUTPUT"
          echo "trigger_reason=${trigger_reason}" >> "$GITHUB_OUTPUT"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: just install-deps

      - name: Install LightGBM runtime dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_ID }}
          service_account: 'ml-pipeline-sa@${{ secrets.TF_VAR_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Pull DVC-tracked training dataset
        if: steps.workflow-inputs.outputs.dataset_source == 'dvc'
        run: |
          dvc pull data.dvc
        env:
          DVC_NO_ANALYTICS: "true"

      - name: Run training and gate pipeline
        run: |
          PROMOTE="${{ github.event_name != 'workflow_dispatch' && 'true' || github.event.inputs.promote }}"
          just train-with-gates \
            --runid "${{ steps.run-meta.outputs.run_id }}" \
            --trigger "${{ github.event_name }}" \
            --commit-sha "${{ github.sha }}" \
            --source-uri "${{ steps.workflow-inputs.outputs.dataset_source }}" \
            --promote "$PROMOTE"
        env:
          # Enable automatic Cloud Run discovery (no secrets needed!)
          MLFLOW_TRACKING_URI_FROM_GCP: "true"
          MLFLOW_CLOUD_RUN_SERVICE: "mlflow-tracking"
          MLFLOW_GCP_REGION: ${{ secrets.TF_VAR_REGION }}
          MLFLOW_GCP_PROJECT_ID: ${{ secrets.TF_VAR_PROJECT_ID }}

          # Fallback: if Cloud Run discovery fails, use explicit secret
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

          # Gate tuning (optional)
          MODEL_CICD_MIN_ACCURACY: "0.70"                    # Accuracy threshold
          MODEL_CICD_MIN_MACRO_F1: "0.65"                    # Macro F1 threshold
          MODEL_CICD_MAX_BIAS_RELATIVE_GAP: "0.70"           # Bias disparity tolerance
          MODEL_CICD_MAX_REGRESSION_DEGRADATION: "0.10"      # % degradation vs production

          MLFLOW_MAX_TUNING_RUNS: "5"                        # Hyperparameter tuning iterations (default: 50)
          GCS_BUCKET_NAME: gs://ticket-forge-training-artifacts-${{ secrets.TF_VAR_PROJECT_ID }}-prod

      - name: Resolve promotion metadata
        id: promotion-meta
        if: always()
        env:
          RUN_ID: ${{ steps.run-meta.outputs.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          gate_path = Path(f"models/{os.environ['RUN_ID']}/gate_report.json")
          promoted_model_version = ""
          gate_decision = ""

          if gate_path.exists():
            gate = json.loads(gate_path.read_text(encoding="utf-8"))
            decision = gate.get("promotion_decision", {}) if isinstance(gate, dict) else {}
            promoted_model_version = str(decision.get("promoted_model_version") or "")
            gate_decision = str(decision.get("decision") or "")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
            output.write(f"promoted_model_version={promoted_model_version}\n")
            output.write(f"gate_decision={gate_decision}\n")
          PY

      - name: Write gate summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          gate_path = Path("models/${{ steps.run-meta.outputs.run_id }}/gate_report.json")
          manifest_path = Path("models/${{ steps.run-meta.outputs.run_id }}/run_manifest.json")

          lines = [
            "## Model CI/CD Summary",
            "",
            f"- Dataset source: ${{ steps.workflow-inputs.outputs.dataset_source }}",
            f"- Trigger reason: ${{ steps.workflow-inputs.outputs.trigger_reason }}",
            f"- Run id: ${{ steps.run-meta.outputs.run_id }}",
          ]

          if gate_path.exists():
            gate = json.loads(gate_path.read_text(encoding="utf-8"))
            decision = gate.get("promotion_decision", {})
            lines.extend(
              [
                f"- Decision: {decision.get('decision', 'unknown')}",
                f"- Promoted model version: {decision.get('promoted_model_version') or 'n/a'}",
                f"- Failure reasons: {decision.get('reasons', []) or []}",
              ]
            )

          if manifest_path.exists():
            manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
            training_dataset = manifest.get("training_dataset")
            if isinstance(training_dataset, dict):
              lines.extend(
                [
                  f"- Dataset version: {training_dataset.get('dataset_version', 'n/a')}",
                  f"- Dataset URI: {training_dataset.get('dataset_path', 'n/a')}",
                ]
              )

          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          EOF

      - name: Upload model artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_id }}
          path: |
            models/${{ steps.run-meta.outputs.run_id }}/
          retention-days: 30

  notify:
    name: Train / Send Status Email
    needs: [train-and-promote]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install notification dependencies
        run: uv sync --all-packages

      - name: Download model artifacts
        if: needs.train-and-promote.outputs.executed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts-${{ github.run_id }}
          path: .

      - name: Build retraining operations report
        run: |
          python3 - <<'EOF'
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, "apps/training")

          from training.analysis.ops_report import (
            build_ops_report,
            write_ops_report,
          )

          status = "${{ needs.train-and-promote.result }}"
          trigger = "${{ github.event_name }}"
          trigger_reason = "${{ needs.train-and-promote.outputs.trigger_reason }}"
          dataset_source = "${{ needs.train-and-promote.outputs.dataset_source }}"
          run_url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          run_id = "${{ needs.train-and-promote.outputs.run_id }}"
          gate_report_path = Path(f"models/{run_id}/gate_report.json") if run_id else None
          manifest_path = Path(f"models/{run_id}/run_manifest.json") if run_id else None
          gate = {}
          manifest = {}
          if gate_report_path and gate_report_path.exists():
            gate = json.loads(gate_report_path.read_text(encoding="utf-8"))
          if manifest_path and manifest_path.exists():
            manifest = json.loads(manifest_path.read_text(encoding="utf-8"))

          decision = gate.get("promotion_decision", {}) if isinstance(gate, dict) else {}
          reasons = decision.get("reasons", []) if isinstance(decision, dict) else []
          training_dataset = (
            manifest.get("training_dataset", {}) if isinstance(manifest, dict) else {}
          )
          report_type = "retraining" if trigger_reason.startswith("drift") else "training"
          ops_report = build_ops_report(
            report_type=report_type,
            workflow_name="Model CI/CD",
            status=status,
            trigger=trigger,
            trigger_reason=trigger_reason,
            workflow_url=run_url,
            commit_sha="${{ github.sha }}",
            dataset_source=dataset_source,
            dataset_version=training_dataset.get("dataset_version")
            if isinstance(training_dataset, dict)
            else None,
            dataset_uri=training_dataset.get("dataset_path")
            if isinstance(training_dataset, dict)
            else None,
            model_version=decision.get("promoted_model_version")
            if isinstance(decision, dict)
            else None,
            failure_reasons=[str(reason) for reason in reasons]
            if isinstance(reasons, list)
            else [],
            metadata={
              "run_id": run_id,
              "gate_decision": decision.get("decision", "unknown")
              if isinstance(decision, dict)
              else "unknown",
            },
          )
          if run_id:
            write_ops_report(
              Path(f"models/{run_id}/operations_report.json"),
              ops_report,
            )
            print(f"Operations report written for run {run_id}")
          else:
            print("No run_id available; skipping operations report write")
          EOF

      - name: Send email notification
        run: |
          python3 - <<'EOF'
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, "apps/training")
          sys.path.insert(0, "libs/shared")

          from training.analysis.gate_report import NotificationEvent, append_notification_event
          from training.analysis.ops_report import send_gmail_notification

          run_id = "${{ needs.train-and-promote.outputs.run_id }}"
          report_path = Path(f"models/{run_id}/operations_report.json") if run_id else None
          gate_report_path = Path(f"models/{run_id}/gate_report.json") if run_id else None
          if not report_path or not report_path.exists():
            print("operations_report.json missing; skipping notification")
            raise SystemExit(0)

          ops_report = json.loads(report_path.read_text(encoding="utf-8"))
          report_type = str(ops_report.get("report_type") or "training")

          sender = os.environ.get("GMAIL_APP_USERNAME")
          password = os.environ.get("GMAIL_APP_PASSWORD")
          if sender and password:
            send_gmail_notification(
              ops_report,
              sender_email=sender,
              sender_password=password,
            )
            if gate_report_path and gate_report_path.exists():
              append_notification_event(
                gate_report_path,
                NotificationEvent(
                  event_type=report_type,
                  channel="email",
                  recipient=sender,
                  delivery_status="sent",
                ),
              )
            print(f"Notification sent to {sender}")
          else:
            print("GMAIL_APP_USERNAME / GMAIL_APP_PASSWORD not set — skipping notification")
          EOF
        env:
          GMAIL_APP_USERNAME: ${{ secrets.GMAIL_APP_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        continue-on-error: true

      - name: Upload retraining operations artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-ops-artifacts-${{ github.run_id }}
          path: |
            models/${{ needs.train-and-promote.outputs.run_id }}/operations_report.json
            models/${{ needs.train-and-promote.outputs.run_id }}/gate_report.json
          retention-days: 30
          if-no-files-found: warn

  dispatch-serving-deploy:
    name: Train / Dispatch Serving Redeploy
    needs: [train-and-promote]
    if: >-
      needs.train-and-promote.result == 'success' &&
      needs.train-and-promote.outputs.promoted_model_version != '' &&
      github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend redeploy for promoted model
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL_VERSION: ${{ needs.train-and-promote.outputs.promoted_model_version }}
        run: |
          gh workflow run serving-deploy.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f "deploy_backend=true" \
            -f "deploy_frontend=false" \
            -f "serving_model_version=${MODEL_VERSION}" \
            -f "trigger_workflow=Model CI/CD" \
            -f "trigger_run_id=${{ github.run_id }}" \
            -f "trigger_run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

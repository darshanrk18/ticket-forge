# Postgres with PgVector for storing engineered features and embeddings.
# Usage: docker compose up -d
# pgAdmin: http://localhost:5050
# Airflow UI: http://localhost:8080

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ticketforge-postgres
    environment:
      POSTGRES_USER: ticketforge
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ticketforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketforge -d ticketforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ticketforge-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ticketforge.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: ticketforge-airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://ticketforge:root@postgres:5432/ticketforge"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth"
      DATABASE_URL: "postgresql://ticketforge:root@postgres:5432/ticketforge"
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      PYTHONPATH: "/opt/ticket-forge/apps/training:/opt/ticket-forge/libs/ml-core:/opt/ticket-forge/libs/shared"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./apps:/opt/ticket-forge/apps
      - ./libs:/opt/ticket-forge/libs
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    command: >
      bash -c "
      airflow db migrate &&
      airflow connections create-default-connections &&
      (airflow users create --username airflow --password airflow --firstname Air --lastname Flow --role Admin --email airflow@example.com || true) &&
      airflow scheduler &
      exec airflow webserver
      "

  webapp:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      args:
        APP_NAME: web-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://ticketforge:root@postgres:5432/ticketforge"
      AIRFLOW_BASE_URL: "http://airflow:8080"
      AIRFLOW_USERNAME: "airflow"
      AIRFLOW_PASSWORD: "airflow"
    restart: "no"
    command:
      - "-m"
      - "uvicorn"
      - "web_backend.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ports:
      - "80:8000"

  trainer:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      args:
        APP_NAME: training
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://ticketforge:root@postgres:5432/ticketforge"
      PYTHONUNBUFFERED: "1"
    restart: "no"
    command:
      - "-m"
      - "apps.training.training.etl.ingest.resume.coldstart"
      - "--pg"
      - "--dsn"
      - "postgresql://ticketforge:root@postgres:5432/ticketforge"

volumes:
  postgres_data:
  pgadmin_data:
  airflow_logs:
  airflow_plugins:

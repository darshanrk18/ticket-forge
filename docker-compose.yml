# Postgres with PgVector for storing engineered features and embeddings.
# Usage: docker compose up -d
# pgAdmin: http://localhost:5050
# Airflow UI: http://localhost:8080

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ticketforge-postgres
    environment:
      POSTGRES_USER: ticketforge
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ticketforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketforge -d ticketforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ticketforge-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ticketforge.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: ticketforge-airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://ticketforge:root@postgres:5432/ticketforge"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth"
      # Our application env vars
      DATABASE_URL: ${DATABASE_URL:-postgresql://ticketforge:root@postgres:5432/ticketforge}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      PYTHONPATH: "/opt/ticket-forge/apps/training:/opt/ticket-forge/libs/ml-core:/opt/ticket-forge/libs/shared"
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      GMAIL_APP_USERNAME: ${GMAIL_APP_USERNAME}
      PYTHONUNBUFFERED: "1"
      # Email/SMTP Configuration
      AIRFLOW__EMAIL__EMAIL_BACKEND: "airflow.utils.email.send_email_smtp"
      AIRFLOW__EMAIL__EMAIL_CONN_ID: "smtp_default"
      AIRFLOW__SMTP__SMTP_HOST: smtp.gmail.com
      AIRFLOW__SMTP__SMTP_PORT: "587"
      AIRFLOW__SMTP__SMTP_USER: ${GMAIL_APP_USERNAME}
      AIRFLOW__SMTP__SMTP_PASSWORD: ${GMAIL_APP_PASSWORD}
      AIRFLOW__SMTP__SMTP_MAIL_FROM: ${GMAIL_APP_USERNAME}
      AIRFLOW__SMTP__SMTP_STARTTLS: "True"
      AIRFLOW__SMTP__SMTP_SSL: "False"
      AIRFLOW__SMTP__SMTP_TIMEOUT: "30"
      AIRFLOW__SMTP__RETRY_LIMIT: "5"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./apps:/opt/ticket-forge/apps
      - ./libs:/opt/ticket-forge/libs
      - ./data:/opt/ticket-forge/data
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins

  webapp:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
      args:
        APP_NAME: web-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ticketforge:root@postgres:5432/ticketforge}
      AIRFLOW_BASE_URL: "http://airflow:8080"
      AIRFLOW_USERNAME: "airflow"
      AIRFLOW_PASSWORD: "airflow"
    restart: "no"
    command:
      - "-m"
      - "uvicorn"
      - "web_backend.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ports:
      - "80:8000"

  # trainer:
  #   build:
  #     context: .
  #     dockerfile: docker/base.Dockerfile
  #     args:
  #       APP_NAME: training
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: "postgresql://ticketforge:root@postgres:5432/ticketforge"
  #     PYTHONUNBUFFERED: "1"
  #   restart: "no"
  #   command:
  #     - "-m"
  #     - "apps.training.training.etl.ingest.resume.coldstart"
  #     - "--pg"
  #     - "--dsn"
  #     - "postgresql://ticketforge:root@postgres:5432/ticketforge"

volumes:
  postgres_data:
  pgadmin_data:
  airflow_logs:
  airflow_plugins:
